name: CI

on:
  push:
    branches: [main, work, "**"]
  pull_request:

jobs:
  # windows-latest: сценарии без shell для tsx/prisma (tests/scenarios-api.test.ts);
  # demo-api-smoke — windowsHide + taskkill дерева процесса после теста.
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma (generate + migrate test database)
        run: npx prisma generate && npx prisma migrate deploy
        env:
          DATABASE_URL: file:./dev.db

      - name: Typecheck
        run: npm run typecheck --silent

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

      - name: E2E smoke (AUTH_MODE=required)
        if: runner.os == 'Linux'
        env:
          E2E_ADMIN_PASSWORD: e2e_ci_auth_pw
          DATABASE_URL: file:./dev.db
          E2E_SKIP_MIGRATE: 'true'
        run: npm run e2e:smoke:auth

      - name: Docker build (Linux)
        if: runner.os == 'Linux'
        run: docker build -t scenario-builder:ci .

      - name: OPA policy tests + bundle (Linux)
        if: runner.os != 'Windows'
        run: |
          curl -sSL -o opa https://openpolicyagent.org/downloads/v0.69.0/opa_linux_amd64_static
          chmod +x opa
          ./opa test policies/
          ./opa build -b policies/ -o /tmp/opa-policy-bundle.tar.gz
          test -s /tmp/opa-policy-bundle.tar.gz

      - name: OPA policy tests + bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://openpolicyagent.org/downloads/v0.69.0/opa_windows_amd64.exe" -OutFile "opa.exe"
          .\opa.exe test policies/
          $bundle = Join-Path $env:TEMP "opa-policy-bundle.tar.gz"
          .\opa.exe build -b policies/ -o $bundle
          if (-not (Test-Path $bundle) -or ((Get-Item $bundle).Length -eq 0)) { throw "bundle missing or empty" }

      - name: Lint (non-blocking for now)
        continue-on-error: true
        run: npm run lint

  # Валидность compose для staging (без запуска контейнеров)
  staging-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.staging.yml
        run: docker compose -f docker-compose.staging.yml config

      - name: Validate docker-compose.staging.ghcr.yml
        run: STAGING_GHCR_IMAGE=ghcr.io/ci/validate:local docker compose -f docker-compose.staging.ghcr.yml config

  dev-infra-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.dev-infra.yml
        run: docker compose -f docker-compose.dev-infra.yml config
