name: CI

on:
  push:
    branches: [main, work, "**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --silent

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

      - name: Lint (non-blocking for now)
        continue-on-error: true
        run: npm run lint
