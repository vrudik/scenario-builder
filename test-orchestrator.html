<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование Runtime Orchestrator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .back-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
            display: inline-block;
            margin-bottom: 20px;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .execution-state {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .node-result {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
        .node-result.completed {
            border-left-color: #10b981;
        }
        .node-result.failed {
            border-left-color: #ef4444;
        }
        .node-result.running {
            border-left-color: #f59e0b;
        }
        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .node-id {
            font-weight: bold;
            color: #333;
        }
        .node-state {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .node-state.completed {
            background: #10b981;
            color: white;
        }
        .node-state.failed {
            background: #ef4444;
            color: white;
        }
        .node-state.running {
            background: #f59e0b;
            color: white;
        }
        .node-outputs {
            margin-top: 10px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .event-history {
            margin-top: 20px;
        }
        .event-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
        }
        .event-item.trigger {
            border-left-color: #10b981;
        }
        .event-item.node_completed {
            border-left-color: #10b981;
        }
        .event-item.node_failed {
            border-left-color: #ef4444;
        }
        .event-item.compensation {
            border-left-color: #f59e0b;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard.html" class="back-link">← Назад к Dashboard</a>
        <a href="/test-agent.html" class="back-link" style="margin-left: 10px;">🧪 Тест Agent Runtime →</a>
        
        <h1>🔄 Тестирование Runtime Orchestrator</h1>
        
        <div class="card">
            <div id="status" class="status"></div>
            
            <form id="testForm">
                <div class="form-group">
                    <label for="scenarioId">ID сценария:</label>
                    <input type="text" id="scenarioId" name="scenarioId" value="orchestrator-test-scenario" required>
                </div>
                
                <div class="form-group">
                    <label for="userIntent">User Intent (для agent узла):</label>
                    <textarea id="userIntent" name="userIntent" rows="3" placeholder="Например: Find information about TypeScript and create a summary" required>Find information about TypeScript and create a summary</textarea>
                </div>
                
                <div class="form-group">
                    <label for="workflowType">Тип Workflow:</label>
                    <select id="workflowType" name="workflowType">
                        <option value="agent-only">Только Agent узел</option>
                        <option value="action-agent">Action → Agent</option>
                        <option value="agent-action">Agent → Action</option>
                        <option value="full">Полный workflow (Action → Agent → Action)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">
                    🚀 Запустить Workflow
                </button>
            </form>
        </div>
        
        <div id="executionResult" class="card" style="display: none;">
            <h2>📊 Результаты выполнения</h2>
            <div id="executionState" class="execution-state">
                <div><strong>Execution ID:</strong> <span id="executionId">-</span></div>
                <div><strong>Текущий узел:</strong> <span id="currentNode">-</span></div>
                <div><strong>Статус:</strong> <span id="executionStatus">-</span></div>
            </div>
            
            <h3 style="margin-top: 20px;">📝 Результаты узлов</h3>
            <div id="nodeResults"></div>
            
            <h3 class="event-history" style="margin-top: 20px;">📜 История событий</h3>
            <div id="eventHistory"></div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('testForm');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('executionResult');
        const submitBtn = document.getElementById('submitBtn');
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
        
        function hideStatus() {
            statusDiv.style.display = 'none';
        }
        
        function getApiBaseUrl() {
            if (window.location.protocol === 'file:') {
                return 'http://localhost:3000';
            }
            return '';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            hideStatus();
            resultDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Выполняется...';
            
            const formData = {
                scenarioId: document.getElementById('scenarioId').value,
                userIntent: document.getElementById('userIntent').value,
                workflowType: document.getElementById('workflowType').value
            };
            
            try {
                showStatus('Отправка запроса к Orchestrator...', 'info');
                
                const apiUrl = getApiBaseUrl() + '/api/orchestrator/execute';
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Workflow выполнен успешно!', 'success');
                    displayExecutionResult(data);
                } else {
                    showStatus(`❌ Ошибка: ${data.error?.message || 'Неизвестная ошибка'}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '🚀 Запустить Workflow';
            }
        });
        
        function displayExecutionResult(data) {
            resultDiv.style.display = 'block';
            
            document.getElementById('executionId').textContent = data.executionId || '-';
            document.getElementById('currentNode').textContent = data.currentNodeId || '-';
            document.getElementById('executionStatus').textContent = 
                data.completed ? '✅ Завершено' : 
                data.failed ? '❌ Ошибка' : 
                '🔄 Выполняется';
            
            // Отображение результатов узлов
            const nodeResultsDiv = document.getElementById('nodeResults');
            nodeResultsDiv.innerHTML = '';
            
            if (data.nodeResults && data.nodeResults.length > 0) {
                data.nodeResults.forEach(nodeResult => {
                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = `node-result ${nodeResult.state}`;
                    
                    const stateClass = nodeResult.state === 'completed' ? 'completed' :
                                     nodeResult.state === 'failed' ? 'failed' :
                                     'running';
                    
                    nodeDiv.innerHTML = `
                        <div class="node-header">
                            <span class="node-id">${nodeResult.nodeId}</span>
                            <span class="node-state ${stateClass}">${nodeResult.state}</span>
                        </div>
                        ${nodeResult.outputs ? `
                            <div class="node-outputs">${JSON.stringify(nodeResult.outputs, null, 2)}</div>
                        ` : ''}
                        ${nodeResult.error ? `
                            <div style="color: #ef4444; margin-top: 10px;">
                                <strong>Ошибка:</strong> ${nodeResult.error.message || nodeResult.error.code}
                            </div>
                        ` : ''}
                    `;
                    
                    nodeResultsDiv.appendChild(nodeDiv);
                });
            } else {
                nodeResultsDiv.innerHTML = '<p>Нет результатов узлов</p>';
            }
            
            // Отображение истории событий
            const eventHistoryDiv = document.getElementById('eventHistory');
            eventHistoryDiv.innerHTML = '';
            
            if (data.eventHistory && data.eventHistory.length > 0) {
                data.eventHistory.forEach(event => {
                    const eventDiv = document.createElement('div');
                    eventDiv.className = `event-item ${event.type}`;
                    eventDiv.innerHTML = `
                        <strong>${event.type}</strong> 
                        ${event.nodeId ? `- ${event.nodeId}` : ''}
                        <br>
                        <small>${new Date(event.timestamp).toLocaleString()}</small>
                        ${event.data ? `<pre style="margin-top: 5px; font-size: 0.8em;">${JSON.stringify(event.data, null, 2)}</pre>` : ''}
                    `;
                    eventHistoryDiv.appendChild(eventDiv);
                });
            } else {
                eventHistoryDiv.innerHTML = '<p>Нет событий</p>';
            }
        }
    </script>
</body>
</html>
